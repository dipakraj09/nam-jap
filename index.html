<!DOCTYPE html>
<html lang="hi">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>नाम जाप - Naam Jaap Game</title>
  <meta name="description" content="नाम जाप - A spiritual chanting game for peace and devotion"/>
  <link rel="icon" type="image/png" sizes="192x192" href="favicon.png"/>
  <link rel="apple-touch-icon" href="favicon.png"/>
  <link rel="manifest" href="site.webmanifest"/>
  <meta name="theme-color" content="#f59e0b"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Rozha+One&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
 </head>
 <body class="h-screen w-full overflow-hidden text-gray-100 bg-black">
  <div class="stars"></div>

  <!-- Top Bar -->
  <div class="fixed top-0 left-0 w-full z-40 p-4 flex justify-between items-center glass-panel-dark" id="topBar">
   <div class="flex items-center space-x-3">
    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-yellow-400 to-orange-600 flex items-center justify-center border-2 border-white/50 text-white text-2xl shadow-[0_0_15px_rgba(234,88,12,0.5)]" id="deityIcon">
     <i class="fas fa-om"></i>
    </div>
    <div class="hidden sm:block">
     <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-amber-500 font-['Yatra_One'] drop-shadow-sm tracking-wide">
      नाम जाप
     </h1>
    </div>
   </div>
   <div class="w-12"></div>
  </div>

  <!-- 3-Dot Menu Button (Floating) -->
  <button class="menu-top-pos w-12 h-12 rounded-full bg-slate-800/80 shadow-lg flex items-center justify-center text-gray-200 hover:text-yellow-400 hover:bg-slate-700 transition border border-slate-600 backdrop-blur-sm" id="menuBtn">
   <i class="fas fa-bars text-xl"></i>
  </button>

  <!-- Options Container -->
  <div class="fixed bg-slate-900/95 rounded-2xl shadow-2xl p-5 w-72 transform scale-0 opacity-0 border border-slate-700 backdrop-blur-md origin-top-right" id="optionsContainer">
   <!-- Mode Selection -->
   <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">
    नाम चुनें
   </h3>
   <div class="space-y-3 mb-5">
    <button class="w-full text-left px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-yellow-100 font-bold transition flex items-center justify-between group border border-slate-700 hover:border-yellow-500/50" onclick="changeMode('sitaram')">
     <span class="font-['Yatra_One'] text-lg">सीता राम</span>
     <i class="fas fa-check-circle text-yellow-400 opacity-0 group-hover:opacity-50 select-indicator text-xl" id="check-sitaram"></i>
    </button>
    <button class="w-full text-left px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-orange-100 font-bold transition flex items-center justify-between group border border-slate-700 hover:border-orange-500/50" onclick="changeMode('ram')">
     <span class="font-['Yatra_One'] text-lg">राम</span>
     <i class="fas fa-check-circle text-orange-400 opacity-0 group-hover:opacity-50 select-indicator text-xl" id="check-ram"></i>
    </button>
    <button class="w-full text-left px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-pink-100 font-bold transition flex items-center justify-between group border border-slate-700 hover:border-pink-500/50" onclick="changeMode('radha')">
     <span class="font-['Yatra_One'] text-lg">राधा</span>
     <i class="fas fa-check-circle text-pink-400 opacity-0 group-hover:opacity-50 select-indicator text-xl" id="check-radha"></i>
    </button>
   </div>

   <!-- Speed Slider Section -->
   <div class="pt-4 border-t border-slate-700 mb-4">
    <div class="flex justify-between items-center mb-3">
     <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">
      <i class="fas fa-tachometer-alt mr-1"></i> गति (Speed)
     </label>
     <span class="text-xs font-bold text-slate-900 bg-yellow-400 px-2 py-1 rounded-full shadow-[0_0_10px_rgba(250,204,21,0.5)]" id="speedValue">50%</span>
    </div>
    <input class="w-full h-2 rounded-lg appearance-none cursor-pointer" id="speedSlider" max="150" min="0" type="range" value="50"/>
    <div class="flex justify-between text-[10px] text-slate-500 mt-2 font-bold uppercase">
     <span>शांत</span>
     <span>तीव्र</span>
    </div>
   </div>

   <!-- Action Buttons -->
   <div class="pt-4 border-t border-slate-700 space-y-2">
    <!-- Full Screen (Original) -->
    <button class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition flex items-center space-x-3" onclick="toggleFullScreen()">
     <i class="fas fa-expand w-5 text-center"></i>
     <span class="text-sm font-bold">फुल स्क्रीन (Full Screen)</span>
    </button>
    <!-- Hide Bar (Original) -->
    <button class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition flex items-center space-x-3" id="toggleBarBtn" onclick="toggleTopBar()">
     <i class="fas fa-eye-slash w-5 text-center"></i>
     <span class="text-sm font-bold">ऊपर की पट्टी हटाएं (Hide Bar)</span>
    </button>
    <!-- Quick Hide & Full Screen (New Combined Button) -->
    <button class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-yellow-300 hover:text-yellow-100 transition flex items-center space-x-3" id="quickHideFullBtn" onclick="quickHideAndFullScreen()">
     <i class="fas fa-bolt w-5 text-center"></i>
     <span class="text-sm font-bold">क्विक हाइड + फुल स्क्रीन</span>
    </button>
    <!-- Pause / Play Button -->
    <button class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition flex items-center space-x-3" id="pausePlayBtn" onclick="togglePausePlay()">
     <i class="fas fa-pause w-5 text-center" id="pausePlayIcon"></i>
     <span class="text-sm font-bold" id="pausePlayText">रुकें (Pause)</span>
    </button>
   </div>
   <div class="mt-4 pt-3 border-t border-slate-700 text-[10px] text-center text-slate-500">
    Spacebar or Tap to Pop
   </div>
  </div>

  <!-- Game Area -->
  <div class="relative w-full h-full z-10" id="gameContainer">
   <!-- Bubbles will be injected here -->
  </div>

  <!-- Bottom Counter (Long press for stats) -->
  <div class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-40 w-full max-w-sm px-4" id="counterArea">
   <div class="glass-panel-dark px-8 py-4 rounded-full flex items-center justify-between border-2 border-yellow-500/50 glow-border bg-gradient-to-r from-slate-900/90 to-blue-900/90 shadow-[0_10px_40px_rgba(0,0,0,0.5)]" id="counterBox">
    <div class="flex flex-col items-start">
     <span class="text-yellow-500/80 text-[11px] font-bold uppercase tracking-[0.2em] mb-1">कुल जाप</span>
     <span class="text-xs text-blue-200 font-medium tracking-wider">ॐ शांति</span>
    </div>
    <div class="flex items-center space-x-3">
     <div class="h-8 w-[1px] bg-slate-600"></div>
     <span class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-yellow-600 font-['Yatra_One'] drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] pb-1" id="score">0</span>
    </div>
   </div>
  </div>

  <!-- Stats Popup (Long Press) -->
  <div class="stats-popup" id="statsPopup">
   <div class="stats-popup-inner">
    <div class="stats-header">
     <i class="fas fa-chart-bar stats-icon"></i>
     <h3>जाप आँकड़े</h3>
    </div>
    <div class="stats-grid">
     <div class="stat-card">
      <div class="stat-value" id="statTotalClicks">0</div>
      <div class="stat-label">कुल क्लिक</div>
     </div>
     <div class="stat-card">
      <div class="stat-value" id="statTotalSkips">0</div>
      <div class="stat-label">कुल स्किप</div>
     </div>
     <div class="stat-card">
      <div class="stat-value" id="statTime">0:00</div>
      <div class="stat-label">कुल समय</div>
     </div>
     <div class="stat-card">
      <div class="stat-value" id="statRate">0</div>
      <div class="stat-label">प्रति मिनट</div>
     </div>
    </div>
    <button class="stats-close-btn" onclick="closeStatsPopup()">
     <i class="fas fa-times"></i> बंद करें
    </button>
   </div>
  </div>

  <script defer="True" src="script.js"></script>
 </body>
</html>
